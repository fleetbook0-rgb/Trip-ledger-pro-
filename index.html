<style>

.phdr{background:linear-gradient(135deg,#0f2444,#1e40af);padding:14px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 16px rgba(15,36,68,.3)}

.ngrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px}

.btn{display:flex;align-items:center;gap:6px;border:none;border-radius:10px;padding:11px 16px;font-size:13px;font-weight:800}

.bar-chart{display:flex;align-items:flex-end;gap:4px;height:120px;background:#fff;border-radius:12px;padding:12px 8px 8px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar{width:100%;border-radius:4px 4px 0 0;min-height:4px}

.scards{display:flex;gap:6px;padding:8px 14px 4px}
.sc{flex:1;background:#fff;border-radius:10px;padding:9px 4px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.sc-v{font-weight:900;font-size:11px;color:#334155}
.sc-l{font-size:9px;color:#94a3b8;margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

.fbox{background:#fff;padding:10px 14px 8px;border-bottom:1px solid #f1f5f9}
.paid-badge{background:#dcfce7;color:#15803d;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700}
.unpaid-badge{background:#fee2e2;color:#dc2626;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700}
.partial-badge{background:#fef9c3;color:#854d0e;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);color:#fff;padding:10px 22px;border-radius:100px;font-weight:700;font-size:13px;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.25);white-space:nowrap;pointer-events:none;display:none}
.vblock{margin:8px 14px;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);border-left:4px solid #f97316}
.vblock-hdr{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#fff7ed;border-bottom:1px solid #fed7aa}
.rform{background:#f8fafc;border-radius:10px;padding:10px;margin-bottom:8px;border:1px solid #e2e8f0}
.empty{text-align:center;padding:28px 0;color:#94a3b8}
.empty-e{font-size:36px;margin-bottom:8px}
.dinp{border:none;border-radius:8px;padding:6px 8px;font-size:12px;background:rgba(255,255,255,.92);font-weight:700;color:#1e293b;outline:none}

/* Auth */
.auth-screen{min-height:100vh;background:linear-gradient(160deg,#0f2444,#1e40af);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.auth-card{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.auth-inp{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;color:#1e293b;outline:none;margin-bottom:12px;background:#fff;-webkit-appearance:none}
.auth-inp:focus{border-color:#3b82f6}
.auth-btn{width:100%;padding:13px;background:linear-gradient(135deg,#1e40af,#f97316);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:800;margin-bottom:12px}

@media print{.nav,.no-print{display:none!important}body{padding-bottom:0}}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyABeo_5-6wkATSpfRoFb3TRvYlF4s1G3NM",
  authDomain: "ledger-book-ef2d4.firebaseapp.com",
  projectId: "ledger-book-ef2d4",
  storageBucket: "ledger-book-ef2d4.firebasestorage.app",
  messagingSenderId: "321914064320",
  appId: "1:321914064320:web:1c7d8b682a60567bd74c25"
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

//  DATA 
let currentUser = null;
let trips=[], clients=[], vehicles=[], drivers=[], expenses=[], payments=[], company={}, driverPayments=[];

function userRef(col){ return collection(db,'users',currentUser.uid,col); }
function userDocRef(col,id){ return doc(db,'users',currentUser.uid,col,id); }

//  HELPERS 
function today(){ return new Date().toISOString().split('T')[0]; }
function fd(s){ if(!s)return''; try{ const[y,m,d]=s.split('-'); return d+'/'+m+'/'+y; }catch(e){ return s; } }
function inr(n){ return ''+Number(n||0).toLocaleString('en-IN'); }
function num(v){ return parseFloat(String(v).replace(/,/g,''))||0; }
function uid(){ return Math.random().toString(36).slice(2,9); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function monthName(m){ return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m]; }
function loading(on){
  if(on){
    document.getElementById('app').innerHTML='<div style="min-height:100vh;background:linear-gradient(160deg,#0f2444,#1e40af);display:flex;flex-direction:column;align-items:center;justify-content:center"><div style="font-size:52px;margin-bottom:16px"></div><div style="width:40px;height:40px;border:4px solid rgba(255,255,255,.2);border-top-color:#60a5fa;border-radius:50%;animation:spin .8s linear infinite"></div><style>@keyframes spin{to{transform:rotate(360deg)}}</style><div style="color:#fff;font-weight:700;margin-top:16px">Loading...</div></div>';
    document.getElementById('main-nav').style.display='none';
  } else {
    document.getElementById('main-nav').style.display='flex';
  }
}
function toast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=type==='err'?'#dc2626':type==='info'?'#1e40af':'#16a34a';
  t.style.display='block';
  setTimeout(()=>t.style.display='none',2800);
}
function dlFile(content,name,type){
  const a=document.createElement('a');
  a.href='data:'+type+';charset=utf-8,\uFEFF'+encodeURIComponent(content);
  a.download=name; a.click();
}

//  LOAD DATA 
async function loadAllData(){
  loading(true);
  try{
    const[tSnap,cSnap,vSnap,dSnap,eSnap,pSnap,coSnap]=await Promise.all([
      getDocs(userRef('trips')),
      getDocs(userRef('clients')),
      getDocs(userRef('vehicles')),
      getDocs(userRef('drivers')),
      getDocs(userRef('expenses')),
      getDocs(userRef('payments')),
      getDoc(doc(db,'users',currentUser.uid,'settings','company')),
    ]);
    trips=tSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    clients=cSnap.docs.map(d=>({id:d.id,...d.data()}));
    const vehDocs=vSnap.docs.map(d=>({id:d.id,...d.data()}));
    vehicles=vehDocs.map(v=>v.number);
    window._vehDetails=vehDocs;
    drivers=dSnap.docs.map(d=>({id:d.id,...d.data()}));
    expenses=eSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    payments=pSnap.docs.map(d=>({id:d.id,...d.data()}));
    try{ const dpSnap=await getDocs(userRef('driverPayments')); driverPayments=dpSnap.docs.map(d=>({id:d.id,...d.data()})); }catch(e){ driverPayments=[]; }
    company=coSnap.exists()?coSnap.data():{name:'',gst:'',address:'',city:'',phone:'',bankName:'',bankAcc:'',bankIFSC:''};
    // Default data for new users
    if(clients.length===0){
      const defClients=[{name:'Milan Bhai',gstNo:'',routes:[{id:'r1',from:'Jaipur',to:'Delhi',rate:4500}]},{name:'Suresh Transport',gstNo:'',routes:[{id:'r2',from:'Jaipur',to:'Mumbai',rate:8000}]}];
      for(const c of defClients){ const ref=await addDoc(userRef('clients'),c); clients.push({id:ref.id,...c}); }
    }
    if(vehicles.length===0){
      await setDoc(doc(db,'users',currentUser.uid,'vehicles','v1'),{number:'RJ14GB1234'});
      vehicles=['RJ14GB1234']; window._vehDetails=[{id:'v1',number:'RJ14GB1234'}];
    }
  }catch(e){ console.error(e); toast('Data load nahi hua. Internet check karo!','err'); document.getElementById('app').innerHTML='<div style="text-align:center;padding:40px 20px"><div style="font-size:48px;margin-bottom:16px">📶</div><div style="font-weight:800;font-size:16px;color:#dc2626;margin-bottom:8px">Internet nahi hai!</div><div style="font-size:13px;color:#64748b;margin-bottom:20px">App ke liye internet zaroori hai. Connect karke dobara try karo.</div><button onclick="location.reload()" style="background:#1e40af;color:#fff;border:none;border-radius:10px;padding:12px 24px;font-weight:700;font-size:14px">Dobara Try Karo</button></div>'; }
  loading(false);
  S.settForm={...company};
  // Auto bill number
  const usedBillNos=trips.map(t=>t.billNo).filter(Boolean);
  const maxBill=usedBillNos.reduce((m,b)=>{ const n=parseInt(b); return(!isNaN(n)&&n>m)?n:m; },0);
  S.billNo=String(maxBill+1).padStart(3,'0');
  render();
}

//  SAVE / DELETE 
async function saveTrip(t,id){
  try{
    if(id){ await setDoc(userDocRef('trips',id),t); trips=trips.map(x=>x.id===id?{id,...t}:x); }
    else{ const r=await addDoc(userRef('trips'),t); trips.unshift({id:r.id,...t}); }
    return true;
  }catch(e){ toast('Save error','err'); return false; }
}
async function delTrip(id){
  try{ await deleteDoc(userDocRef('trips',id)); trips=trips.filter(t=>t.id!==id); render(); }catch(e){ toast('Error','err'); }
}
async function saveClient(data,id){
  try{
    if(id){ await setDoc(userDocRef('clients',id),data); clients=clients.map(c=>c.id===id?{id,...data}:c); }
    else{ const r=await addDoc(userRef('clients'),data); clients.push({id:r.id,...data}); }
    return true;
  }catch(e){ toast('Save error','err'); return false; }
}
async function delClient(id){
  try{ await deleteDoc(userDocRef('clients',id)); clients=clients.filter(c=>c.id!==id); render(); }catch(e){}
}
async function saveVehicle(num){
  const r=await addDoc(userRef('vehicles'),{number:num,status:'active'});
  const vd=window._vehDetails||[]; vd.push({id:r.id,number:num,status:'active'}); window._vehDetails=vd; vehicles.push(num);
}
async function setVehStatus(vNum,status,reason){
  const vDoc=(window._vehDetails||[]).find(x=>x.number===vNum);
  if(!vDoc) return;
  const now=today();
  const updated={...vDoc,status,statusReason:reason||'',statusDate:now};
  try{
    await setDoc(userDocRef('vehicles',vDoc.id),updated);
    const idx=window._vehDetails.findIndex(x=>x.number===vNum);
    if(idx>=0) window._vehDetails[idx]=updated;
    toast(status==='active'?' Gaari Active!':status==='parked'?' Gaari Parked!':status==='maintenance'?' Maintenance Mode!':'Status Updated');
    S.vehStatusModal=null; render();
  }catch(e){toast('Error','err');}
}
async function delVehicle(v){
  const vd=window._vehDetails||[]; const obj=vd.find(x=>x.number===v);
  if(obj) await deleteDoc(userDocRef('vehicles',obj.id));
  window._vehDetails=(window._vehDetails||[]).filter(x=>x.number!==v);
  vehicles=vehicles.filter(x=>x!==v);
}
async function saveDriver(data,id){
  try{
    if(id){ await setDoc(userDocRef('drivers',id),data); drivers=drivers.map(d=>d.id===id?{id,...data}:d); }
    else{ const r=await addDoc(userRef('drivers'),data); drivers.push({id:r.id,...data}); }
    return true;
  }catch(e){ toast('Save error','err'); return false; }
}
async function delDriver(id){
  try{ await deleteDoc(userDocRef('drivers',id)); drivers=drivers.filter(d=>d.id!==id); render(); }catch(e){}
}
async function saveExpense(exp){
  const r=await addDoc(userRef('expenses'),exp); expenses.unshift({id:r.id,...exp}); render();
}
async function delExpense(id){
  try{ await deleteDoc(userDocRef('expenses',id)); expenses=expenses.filter(e=>e.id!==id); render(); }catch(e){}
}
async function savePayment(data,id){
  try{
    if(id){ await setDoc(userDocRef('payments',id),data); payments=payments.map(p=>p.id===id?{id,...data}:p); }
    else{ const r=await addDoc(userRef('payments'),data); payments.push({id:r.id,...data}); }
    return true;
  }catch(e){ toast('Save error','err'); return false; }
}
async function delPayment(id){
  try{ await deleteDoc(userDocRef('payments',id)); payments=payments.filter(p=>p.id!==id); render(); }catch(e){}
}
async function saveCompany(data){

async function doAuth(){
  const email=(document.getElementById('auth-email')?.value||'').trim();
  const pass=document.getElementById('auth-pass')?.value||'';
  const errEl=document.getElementById('auth-err');
  function showErr(msg){ errEl.textContent=msg; errEl.style.display='block'; }
  if(!email||!pass){ showErr('Email aur password daalein'); return; }
  const btn=document.querySelector('.auth-btn'); btn.textContent='Loading...'; btn.disabled=true;
  try{
    if(S.authMode==='register') await createUserWithEmailAndPassword(auth,email,pass);
    else await signInWithEmailAndPassword(auth,email,pass);
  }catch(e){
    btn.textContent=S.authMode==='login'?' Login':' Account Banao'; btn.disabled=false;
    const msgs={'auth/user-not-found':'Email nahi mila','auth/wrong-password':'Galat password','auth/email-already-in-use':'Email pehle se registered hai','auth/invalid-email':'Invalid email','auth/weak-password':'Password weak hai','auth/invalid-credential':'Email ya password galat hai'};
    showErr(msgs[e.code]||e.message);
  }
}
async function forgotPass(){
  const email=prompt('Email address daalo:'); if(!email) return;
  try{ await sendPasswordResetEmail(auth,email); toast(' Reset email bheja!'); }
  catch(e){ toast('Error: '+e.message,'err'); }
}
async function doLogout(){
  if(!confirm('Logout karna chahte ho?')) return;
  try{ await signOut(auth); }catch(e){ toast('Logout error','err'); }
}

  if(S.payModal) return pagePayModal();
  if(S.driverSalaryPage) return pageDriverSalary();

  if(S.driverExtraModal) return pageDriverExtraModal();
  if(S.vehStatusModal) return pageVehStatusModal();
  if(S.vehEditForm) return pageVehEditForm();
  if(S.vehStatusForm) return pageVehStatusForm();
  switch(S.page){
    case 'home':    return pageHome();
    case 'entry':   return pageEntry();
    case 'bills':   return pageBills();
    case 'cash':    return pageCash();
    case 'more':    return pageMore();
    case 'clients': return pageClients();
    case 'fleet':   return pageFleet();
    case 'drivers': return pageDrivers();

    case 'settings':return pageSettings();

  }
}

function getPV(v){ return S.pending.find(p=>p.vehicleNo===v); }
function getR(v,rid){ return getPV(v)?.rows.find(r=>r.id===rid); }
function togV(v){ const i=S.pending.findIndex(p=>p.vehicleNo===v); if(i>=0) S.pending.splice(i,1); else S.pending.push({vehicleNo:v,rows:[{id:uid(),clientId:'',routeId:'',driverId:'',from:'',to:'',amount:'',clientPaid:'',clientPaidAmt:''}]}); render(); }
function updCl(v,rid,val){ const r=getR(v,rid); if(!r)return; r.clientId=val; r.routeId=''; r.from=''; r.to=''; r.amount=''; render(); }
function updRt(v,rid,val){ const r=getR(v,rid); if(!r)return; r.routeId=val; const cl=clients.find(c=>c.id===r.clientId); const rt=cl?.routes.find(x=>x.id===val); if(rt){r.from=rt.from;r.to=rt.to;r.amount=rt.rate;} render(); }
function updF(v,rid,f,val){ const r=getR(v,rid); if(r) r[f]=val; }
function togClientPaid(v,rid){ const r=getR(v,rid); if(!r)return; r.clientPaid=!r.clientPaid; if(!r.clientPaid) r.clientPaidAmt=''; render(); }
function addRow(v){ const p=getPV(v); if(p) p.rows.push({id:uid(),clientId:'',routeId:'',driverId:'',from:'',to:'',amount:'',clientPaid:'',clientPaidAmt:''}); render(); }
function delRow(v,rid){ const p=getPV(v); if(!p)return; p.rows=p.rows.filter(r=>r.id!==rid); if(!p.rows.length) p.rows=[{id:uid(),clientId:'',routeId:'',driverId:'',from:'',to:'',amount:''}]; render(); }

async function saveTrips(){
  const newT=[]; let skip=0; const advancePayments=[];
  S.pending.forEach(p=>p.rows.forEach(r=>{
    if(!r.clientId||!String(r.from).trim()||!String(r.to).trim()||!r.amount){skip++;return;}
    const cl=clients.find(c=>c.id===r.clientId);
    const drv=drivers.find(d=>d.id===r.driverId);
    const clientPaidAmt=r.clientPaid&&r.clientPaidAmt?num(r.clientPaidAmt):0;
    newT.push({date:S.entryDate,vehicleNo:p.vehicleNo,clientId:r.clientId,client:cl?.name||'',routeId:r.routeId||'',driverId:r.driverId||'',driver:drv?.name||'',from:r.from,to:r.to,amount:num(r.amount),payStatus:'unpaid',clientPaidAmt});
    // If client paid driver on trip, record as driver advance
    if(clientPaidAmt>0&&drv){
      const month=S.entryDate.slice(0,7);
      advancePayments.push({driverId:drv.id,driverName:drv.name,month,amount:clientPaidAmt,type:'advance',note:`Client ${cl?.name||''} ne trip pe diya (${r.from} → ${r.to})`,date:S.entryDate});
    }
  }));
  if(!newT.length){toast('Valid trip bharo!','err');return;}
  const btn=document.querySelector('.btn.primary.full'); if(btn){btn.textContent='Saving...';btn.disabled=true;}
  for(const t of newT){ const ref=await addDoc(userRef('trips'),t); trips.unshift({id:ref.id,...t}); }
  // Save client-paid-on-trip as driver advances
  for(const ap of advancePayments){
    const r2=await addDoc(userRef('driverPayments'),ap); driverPayments.push({id:r2.id,...ap});
  }
  const advMsg=advancePayments.length>0?` + ${advancePayments.length} driver advance!`:'';
  toast('✅ '+newT.length+' trips save!'+advMsg+(skip?' ('+skip+' skip)':''));
  S.pending=[]; render();
}

function bRange(){
  const d=new Date(),{billPeriod:p,billFrom:bf,billTo:bt}=S;
  if(p==='today') return[today(),today()];
  if(p==='week'){ const s=new Date(d); s.setDate(d.getDate()-6); return[s.toISOString().split('T')[0],today()]; }
  if(p==='month') return[new Date(d.getFullYear(),d.getMonth(),1).toISOString().split('T')[0],today()];
  return[bf||today(),bt||today()];
}
function fTrips(sc,rf,rt){ return trips.filter(t=>t.date>=rf&&t.date<=rt&&(sc==='all'||t.clientId===sc)).sort((a,b)=>a.date.localeCompare(b.date)); }

function getPayStatus(){
  return clients.map(c=>{
    const cT=trips.filter(t=>t.clientId===c.id);
    const total=cT.reduce((s,t)=>s+t.amount,0);
    const paid=payments.filter(p=>p.clientId===c.id).reduce((s,p)=>s+p.amount,0);
    const pending=Math.max(0,total-paid);
    const status=pending===0?'paid':paid>0?'partial':'unpaid';
    return{clientId:c.id,clientName:c.name,total,paid,pending,status,trips:cT.length};
  }).filter(p=>p.trips>0);
}

      const extraTotal=driverExtras.reduce((s,e)=>s+e.amount,0);
      const totalSalary=baseSalary+extraTotal;
      const totalPaid=driverPayments.filter(p=>p.driverId===d.id&&p.month===month).reduce((s,p)=>s+p.amount,0);
      return`<div class="card" style="border-left:4px solid #f97316">

          <div style="text-align:right"><div style="font-weight:900;font-size:16px;color:#f97316">${inr(totalSalary)}</div><div style="font-size:10px;color:#94a3b8">Total</div></div>
        </div>
        <div style="display:flex;gap:6px;margin-bottom:8px">
          <div style="flex:1;background:#fff7ed;border-radius:8px;padding:8px;text-align:center"><div style="font-weight:900;font-size:14px;color:#ea580c">${workDays}</div><div style="font-size:10px;color:#94a3b8">Kaam ke Din</div></div>
          <div style="flex:1;background:#eff6ff;border-radius:8px;padding:8px;text-align:center"><div style="font-weight:900;font-size:14px;color:#1e40af">${inr(baseSalary)}</div><div style="font-size:10px;color:#94a3b8">Base</div></div>
          <div style="flex:1;background:#fef2f2;border-radius:8px;padding:8px;text-align:center"><div style="font-weight:900;font-size:14px;color:#dc2626">${inr(extraTotal)}</div><div style="font-size:10px;color:#94a3b8">Extra</div></div>
        </div>
        ${driverExtras.map(e=>`<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-top:1px solid #f1f5f9;font-size:12px">
          <span style="color:#94a3b8;flex:1">${fd(e.date)} � ${esc(e.desc||'Extra')}</span>
          <span style="font-weight:700;color:#dc2626">${inr(e.amount)}</span>
          <button class="btn-del" onclick="delExpense('${e.id}')">${I.del}</button>
        </div>`).join('')}
        <button style="width:100%;background:#fff7ed;border:2px dashed #f97316;border-radius:8px;padding:8px;font-size:12px;font-weight:700;color:#ea580c;cursor:pointer;margin-bottom:8px" onclick="addDriverExtra('${d.id}','${esc(d.name)}')">+ Extra Kharcha Add</button>
        <div style="border-top:2px solid #f1f5f9;padding-top:8px">
          <div style="font-size:11px;font-weight:700;color:#475569;margin-bottom:6px"> Payments</div>
          ${driverPayments.filter(p=>p.driverId===d.id&&p.month===month).map(p=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f8fafc;font-size:12px">
            <span style="flex:1;color:#475569">${fd(p.date)} � ${esc(p.note||p.type)}</span>
            <span style="font-weight:700;color:${p.type==='advance'?'#f97316':'#16a34a'}">${p.type==='advance'?'ADV ':''} ${inr(p.amount)}</span>
            <button class="btn-del" onclick="delDriverPayment('${p.id}')">${I.del}</button>
          </div>`).join('')}
          <div style="display:flex;gap:6px;margin-top:6px">
            <button style="flex:1;background:#16a34a;color:#fff;border:none;border-radius:8px;padding:8px;font-size:12px;font-weight:700" onclick="addDriverPay('${d.id}','${esc(d.name)}','${month}','paid')"> Paid Karo</button>
            <button style="flex:1;background:#f97316;color:#fff;border:none;border-radius:8px;padding:8px;font-size:12px;font-weight:700" onclick="addDriverPay('${d.id}','${esc(d.name)}','${month}','advance')"> Advance</button>
          </div>
          <div style="display:flex;justify-content:space-between;background:#fef2f2;border-radius:8px;padding:8px;margin-top:6px">
            <span style="font-size:12px;color:#475569">Baaki:</span>
            <span style="font-weight:900;color:#dc2626">${inr(Math.max(0,totalSalary-totalPaid))}</span>
          </div>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function pageDriverPayModal(){
  const{driverName,type,amt,note}=S.driverPayModal;
  return `<div style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end">
  <div style="background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:640px;margin:0 auto">
    <div style="font-weight:800;font-size:16px;margin-bottom:4px">${type==='advance'?'Advance':'Payment'} - ${esc(driverName)}</div>
    <div class="fgrp"><div class="flbl">Amount </div><input class="finp" type="number" id="dpay-amt" value="${amt}" oninput="S.driverPayModal.amt=this.value" placeholder="0"></div>
    <div class="fgrp"><div class="flbl">Note</div><input class="finp" id="dpay-note" value="${note}" oninput="S.driverPayModal.note=this.value" placeholder="Optional..."></div>
    <div class="row">
      <button class="btn primary" style="flex:1;justify-content:center" onclick="submitDriverPay()">${type==='advance'?' Advance Add':' Save Payment'}</button>
      <button class="btn gray" style="flex:1;justify-content:center" onclick="S.driverPayModal=null;render()">Cancel</button>
    </div>
  </div></div>`;
}
function pageDriverExtraModal(){
  const{driverName,desc,amt,date}=S.driverExtraModal;
  return `<div style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end">
  <div style="background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:640px;margin:0 auto">
    <div style="font-weight:800;font-size:16px;margin-bottom:4px">Extra Kharcha - ${esc(driverName)}</div>
    <div class="fgrp"><div class="flbl">Kharche ka naam</div><input class="finp" id="dext-desc" value="${desc}" oninput="S.driverExtraModal.desc=this.value" placeholder="Kharcha..."></div>
    <div class="fgrp"><div class="flbl">Amount </div><input class="finp" type="number" id="dext-amt" value="${amt}" oninput="S.driverExtraModal.amt=this.value" placeholder="0"></div>
    <div class="fgrp"><div class="flbl">Tarikh</div><input type="date" class="finp" id="dext-date" value="${date}" oninput="S.driverExtraModal.date=this.value"></div>
    <div class="row">
      <button class="btn primary" style="flex:1;justify-content:center" onclick="submitDriverExtra()"> Save</button>
      <button class="btn gray" style="flex:1;justify-content:center" onclick="S.driverExtraModal=null;render()">Cancel</button>
    </div>
  </div></div>`;
}
async function addDriverPay(driverId,driverName,month,type){
  S.driverPayModal={driverId,driverName,month,type,amt:'',note:''};
  render();
}
async function submitDriverPay(){
  const{driverId,driverName,month,type,amt,note}=S.driverPayModal;
  const amount=num(amt);
  if(!amount||amount<=0){toast('Valid amount daalein','err');return;}
  await saveDriverPayment(driverId,driverName,month,amount,type,note||'');
  toast(type==='advance'?' Advance add!':' Payment mark!');
  S.driverPayModal=null; render();
}
async function addDriverExtra(driverId,driverName){
  S.driverExtraModal={driverId,driverName,desc:'',amt:'',date:S.driverSalaryMonth+'-01'};
  render();
}
async function submitDriverExtra(){
  const{driverId,driverName,desc,amt,date}=S.driverExtraModal;
  if(!desc.trim()){toast('Kharche ka naam daalein','err');return;}
  const amount=num(amt);
  if(!amount||amount<=0){toast('Valid amount daalein','err');return;}
  await saveExpense({date:date||S.driverSalaryMonth+'-01',category:'driver_extra',vehicle:'',desc,amount,driverName,driverId});
  toast(' Extra kharcha add!');
  S.driverExtraModal=null; render();
}

function pageDriverForm(){
  const f=S.driverForm;
  return `<div class="phdr"><button class="back-btn" onclick="closeDf()">${I.back}</button><div class="phdr-title">${S.editingDriver?'Edit':'Naya'} Driver</div></div>
  <div class="sec">
    <div class="fgrp"><label class="flbl">Driver Name *</label><input class="finp" id="df-name" value="${esc(f.name)}" placeholder="Ramesh Kumar..."></div>
    <div class="row">
      <div class="fgrp" style="flex:1"><label class="flbl">Phone</label><input class="finp" id="df-phone" type="tel" value="${esc(f.phone)}" placeholder="98XXXXXXXX"></div>
      <div class="fgrp" style="flex:1"><label class="flbl">Vehicle</label>
        <select class="fsel" id="df-veh"><option value="">�</option>${vehicles.map(v=>`<option value="${v}" ${f.vehicle===v?'selected':''}>${esc(v)}</option>`).join('')}</select>
      </div>
    </div>
    <div class="fgrp"><label class="flbl">Daily Rate </label><input class="finp" id="df-rate" type="number" value="${f.dailyRate||600}" placeholder="600"></div>
    <div class="row"><button class="btn primary" onclick="doSaveDr()">${I.ok} Save</button><button class="btn gray" onclick="closeDf()">Cancel</button></div>
  </div>`;
}
function openDF(id){
  if(id){ const d=drivers.find(x=>x.id===id); S.driverForm={name:d.name,phone:d.phone||'',vehicle:d.vehicle||'',dailyRate:d.dailyRate||600}; S.editingDriver=id; }
  else{ S.driverForm={name:'',phone:'',vehicle:'',dailyRate:600}; S.editingDriver=null; }
  render();
}
function closeDf(){ S.driverForm=null; S.editingDriver=null; render(); }
async function doSaveDr(){
  const name=(document.getElementById('df-name')?.value||'').trim();
  const phone=(document.getElementById('df-phone')?.value||'').trim();
  const vehicle=document.getElementById('df-veh')?.value||'';
  const dailyRate=num(document.getElementById('df-rate')?.value)||600;
  if(!name){toast('Driver naam daalein','err');return;}
  const ok=await saveDriver({name,phone,vehicle,dailyRate},S.editingDriver);
  if(ok){ toast(S.editingDriver?'Update ':'Driver add '); closeDf(); }
}
async function doDelDr(id){ if(!confirm('Delete?'))return; await delDriver(id); toast('Deleted','err'); }

function pageSettings(){
  const f=S.settForm||{};
  const FIELDS=[{k:'name',l:'Company Name *',p:'Aapki Transport Co.'},{k:'address',l:'Address',p:'Gali, Mohalla'},{k:'city',l:'City, State',p:'Jaipur, Rajasthan'},{k:'phone',l:'Phone',p:'98XXXXXXXX'},{k:'gst',l:'GSTIN',p:'27XXXXX1234X1Z5'},{k:'bankName',l:'Bank Name',p:'SBI/HDFC'},{k:'bankAcc',l:'Account No.',p:'XXXXXXXXXXXX'},{k:'bankIFSC',l:'IFSC',p:'SBIN0001234'}];
  return `<div class="phdr"><button class="back-btn" onclick="go('more')">${I.back}</button><div class="phdr-title">Settings </div></div>
  <div style="background:linear-gradient(135deg,#1e3a5f,#2563eb);margin:12px;border-radius:14px;padding:16px;display:flex;align-items:center;gap:12px">
    <div style="font-size:36px"></div>
    <div><div style="font-weight:900;font-size:16px;color:#fff">${esc(f.name||'Aapki Company')}</div>
    <div style="font-size:11px;color:rgba(255,255,255,.6);margin-top:2px">${currentUser?.email}</div></div>
  </div>
  <div class="sec">
    <div class="sec-title">Company Info</div>
    ${FIELDS.map(fi=>`<div class="fgrp"><label class="flbl">${fi.l}</label><input class="finp" value="${esc(f[fi.k]||'')}" placeholder="${fi.p}" oninput="S.settForm['${fi.k}']=this.value"></div>`).join('')}
    <button class="btn primary full" onclick="doSaveSett()">${I.ok} Save Settings</button>
  </div>
  <div class="sec">
    <div class="sec-title">Account</div>
    <button class="btn red full" onclick="doLogout()">Logout</button>
  </div>
  <div class="sec">
    <div class="sec-title">Backup</div>
    <button class="btn green full" onclick="fullBackup()">${I.dl} CSV Backup</button>
  </div>`;
}

async function doSaveSett(){
  if(!S.settForm.name?.trim()){toast('Company naam daalein','err');return;}
  const ok=await saveCompany({...S.settForm});
  if(ok){ toast(' Settings save!'); go('more'); }
}
function fullBackup(){
  const csv='#,Tarikh,Vehicle,Client,From,To,Amount\n'+trips.map((t,i)=>[i+1,fd(t.date),t.vehicleNo,t.client,t.from,t.to,t.amount].join(',')).join('\n');
  dlFile(csv,'backup-'+today()+'.csv','text/csv'); toast(' Backup!');
}
