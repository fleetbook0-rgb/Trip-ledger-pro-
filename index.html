<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trip Ledger">
<meta name="theme-color" content="#0f2444">
<title>Trip Ledger Pro 🚛</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="Trip Ledger Pro">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:#f1f5f9;min-height:100vh;max-width:640px;margin:0 auto;padding-bottom:80px;-webkit-overflow-scrolling:touch}
input,select,textarea,button{font-family:inherit;-webkit-appearance:none;appearance:none;border-radius:0}
button{cursor:pointer;transition:opacity .15s;-webkit-touch-callout:none}
button:active{opacity:.75}
input[type=date],input[type=month]{-webkit-appearance:none;appearance:none}

/* NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:640px;background:#0f2444;display:flex;border-top:1px solid rgba(255,255,255,.1);z-index:100;padding-bottom:env(safe-area-inset-bottom,0px)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;color:rgba(255,255,255,.4);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;border:none;background:none;gap:4px;min-height:52px}
.nb.on{color:#fb923c}
.nb svg{width:20px;height:20px;flex-shrink:0}

/* AUTH SCREEN */
.auth-screen{min-height:100vh;background:linear-gradient(160deg,#0f2444,#1e40af);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;padding-bottom:env(safe-area-inset-bottom,24px)}
.auth-card{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.auth-title{font-size:22px;font-weight:900;color:#1e293b;margin-bottom:4px}
.auth-sub{font-size:13px;color:#94a3b8;margin-bottom:24px}
.auth-inp{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;color:#1e293b;outline:none;margin-bottom:12px;background:#fff}
.auth-inp:focus{border-color:#3b82f6}
.auth-btn{width:100%;padding:13px;background:linear-gradient(135deg,#1e40af,#f97316);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:800;margin-bottom:12px;box-shadow:0 4px 14px rgba(249,115,22,.3)}
.auth-link{text-align:center;font-size:13px;color:#3b82f6;font-weight:600;cursor:pointer;background:none;border:none;width:100%;padding:4px}
.auth-err{background:#fef2f2;color:#dc2626;border-radius:8px;padding:10px 12px;font-size:12px;font-weight:600;margin-bottom:12px;display:none}

/* HERO */
.hero{background:linear-gradient(160deg,#0f2444,#1e40af);padding:20px 16px 16px;padding-top:calc(20px + env(safe-area-inset-top,0px));box-shadow:0 6px 24px rgba(15,36,68,.4)}
.stats-row{display:flex;gap:6px;margin-top:10px}
.stat{flex:1;background:rgba(255,255,255,.12);border-radius:10px;padding:9px 4px;text-align:center}
.stat-v{font-size:12px;font-weight:900;color:#fff;line-height:1}
.stat-v.g{color:#86efac}.stat-v.r{color:#fca5a5}
.stat-l{font-size:8px;color:rgba(255,255,255,.55);margin-top:3px;text-transform:uppercase;letter-spacing:.3px}

/* PAGE HDR */
.phdr{background:linear-gradient(135deg,#0f2444,#1e40af);padding:14px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 16px rgba(15,36,68,.3)}
.phdr-title{font-size:16px;font-weight:800;color:#fff;flex:1}
.back-btn{background:rgba(255,255,255,.15);border:none;border-radius:8px;padding:7px;color:#fff;display:flex;align-items:center;flex-shrink:0}
.hadd-btn{background:rgba(255,255,255,.18);border:none;border-radius:8px;padding:7px 12px;color:#fff;font-weight:700;font-size:12px;display:flex;align-items:center;gap:4px;flex-shrink:0}

/* CARDS */
.ngrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px}
.nc{background:#fff;border-radius:12px;padding:12px 8px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.06);border-bottom:3px solid #e2e8f0;text-align:center}
.nc-e{font-size:22px;margin-bottom:4px}
.nc-l{font-weight:800;font-size:11px;color:#1e293b;line-height:1.2}
.nc-s{font-size:10px;color:#94a3b8;margin-top:2px}

/* COMMON */
.sec{padding:10px 14px}
.sec-title{font-weight:800;font-size:10px;color:#94a3b8;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.row{display:flex;gap:8px}
.card{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.trip-row{display:flex;align-items:center;gap:8px;background:#fff;border-radius:10px;padding:9px 12px;margin-bottom:6px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.vpill{background:#eff6ff;color:#1d4ed8;font-weight:800;font-size:11px;padding:3px 8px;border-radius:6px;flex-shrink:0}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#0f2444,#1e40af);color:#fff;font-weight:900;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* FORM */
.flbl{font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px;display:block}
.finp{padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;background:#fff;outline:none;width:100%;color:#1e293b}
.finp:focus{border-color:#3b82f6}
.fsel{padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;background:#fff;outline:none;width:100%;color:#1e293b}
.fgrp{margin-bottom:10px}

/* BUTTONS */
.btn{display:flex;align-items:center;gap:6px;border:none;border-radius:10px;padding:11px 16px;font-size:13px;font-weight:800}
.btn.primary{background:linear-gradient(135deg,#1e40af,#f97316);color:#fff;box-shadow:0 3px 12px rgba(249,115,22,.25)}
.btn.full{width:100%;justify-content:center}
.btn.green{background:#15803d;color:#fff}
.btn.wa{background:#25d366;color:#fff}
.btn.red{background:#dc2626;color:#fff}
.btn.gray{background:#f1f5f9;color:#64748b}
.btn.sm{padding:8px 12px;font-size:12px;border-radius:8px}
.btn-del{background:#fff0f0;color:#dc2626;border:none;border-radius:6px;padding:5px 6px;display:flex;align-items:center}
.btn-edit{background:#eff6ff;color:#1d4ed8;border:none;border-radius:6px;padding:5px 6px;display:flex;align-items:center}
.action-row{display:flex;gap:8px;padding:4px 14px 8px;flex-wrap:wrap}
.chip{padding:6px 10px;border-radius:20px;border:2px solid #e2e8f0;font-size:12px;font-weight:700;background:#fff;color:#64748b;display:inline-flex;align-items:center;gap:3px;cursor:pointer;user-select:none;-webkit-user-select:none}
.chip.on{border-color:#16a34a;background:#f0fdf4;color:#15803d}
.chip-wrap{display:flex;flex-wrap:wrap;gap:6px}
.type-btns{display:flex;gap:5px}
.tbtn{flex:1;padding:8px 4px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;font-weight:700;background:#fff;color:#64748b}
.tbtn.on{border-color:#1e40af;background:#1e40af;color:#fff}

/* TABLE */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
table{width:100%;border-collapse:collapse;font-size:12px;background:#fff;min-width:360px}
th{padding:8px;color:#fff;font-weight:700;text-align:left;font-size:11px;background:#1e3a5f}
td{padding:7px 8px;color:#334155;border-bottom:1px solid #f1f5f9}
tr:nth-child(even) td{background:#f8fafc}
tfoot td{background:#eff6ff;font-weight:800;color:#1d4ed8}
tfoot tr:last-child td{background:#1e3a5f;color:#fff;font-weight:900;font-size:13px}

/* CHART */
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:120px;background:#fff;border-radius:12px;padding:12px 8px 8px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar{width:100%;border-radius:4px 4px 0 0;min-height:4px}
.bar-lbl{font-size:8px;color:#94a3b8;font-weight:700;white-space:nowrap}

/* SUMMARY CARDS */
.scards{display:flex;gap:6px;padding:8px 14px 4px}
.sc{flex:1;background:#fff;border-radius:10px;padding:9px 4px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.sc-v{font-weight:900;font-size:11px;color:#334155}
.sc-l{font-size:9px;color:#94a3b8;margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* FILTER */
.fbox{background:#fff;padding:10px 14px 8px;border-bottom:1px solid #f1f5f9}

/* BADGES */
.paid-badge{background:#dcfce7;color:#15803d;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700}
.unpaid-badge{background:#fee2e2;color:#dc2626;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700}
.partial-badge{background:#fef9c3;color:#854d0e;border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700}

/* TOAST */
.toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);color:#fff;padding:10px 22px;border-radius:100px;font-weight:700;font-size:13px;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.25);white-space:nowrap;pointer-events:none;display:none}

/* LOADING */
.loader{position:fixed;inset:0;background:linear-gradient(160deg,#0f2444,#1e40af);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
.spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,.2);border-top-color:#60a5fa;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* EMPTY */
.empty{text-align:center;padding:28px 0;color:#94a3b8}
.empty-e{font-size:36px;margin-bottom:8px}

/* DATE INP */
.dinp{border:none;border-radius:8px;padding:6px 8px;font-size:12px;background:rgba(255,255,255,.92);font-weight:700;color:#1e293b;outline:none}

/* V-BLOCK */
.vblock{margin:8px 14px;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);border-left:4px solid #f97316}
.vblock-hdr{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#fff7ed;border-bottom:1px solid #fed7aa}

/* ROUTE FORM */
.rform{background:#f8fafc;border-radius:10px;padding:10px;margin-bottom:8px;border:1px solid #e2e8f0}

/* USER BADGE */
.user-badge{background:rgba(255,255,255,.15);border-radius:8px;padding:5px 10px;display:flex;align-items:center;gap:6px}

@media print{.nav,.no-print{display:none!important}body{padding-bottom:0;max-width:100%}}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loader" id="loader">
  <div style="font-size:48px;margin-bottom:8px">🚛</div>
  <div class="spinner"></div>
  <div style="color:#fff;font-weight:700;font-size:16px">Trip Ledger Pro</div>
  <div style="color:rgba(255,255,255,.6);font-size:12px;margin-top:4px">Loading...</div>
</div>

<div id="app" style="display:none"></div>
<div id="toast" class="toast"></div>

<nav class="nav" id="main-nav" style="display:none">
  <button class="nb on" id="nb-home" onclick="go('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>Home
  </button>
  <button class="nb" id="nb-entry" onclick="go('entry')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Entry
  </button>
  <button class="nb" id="nb-bills" onclick="go('bills')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>Bills
  </button>
  <button class="nb" id="nb-cash" onclick="go('cash')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Cash
  </button>
  <button class="nb" id="nb-more" onclick="go('more')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>More
  </button>
</nav>

<!-- Firebase SDKs -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, deleteDoc, query, where, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD6LX8ZAOyWBvxIVJDLFF2eRZ9OlBqlQKo",
  authDomain: "trip-ledger-pro.firebaseapp.com",
  projectId: "trip-ledger-pro",
  storageBucket: "trip-ledger-pro.firebasestorage.app",
  messagingSenderId: "500237765860",
  appId: "1:500237765860:web:1acf08573cbf08ead4f0f1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ── UTILS ──────────────────────────────────────────────────────────────────
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function today(){return new Date().toISOString().split('T')[0];}
function fd(d){if(!d)return'';try{const[y,m,dy]=d.split('-');return dy+'/'+m+'/'+y;}catch(e){return d;}}
function inr(n){return '₹'+Number(n||0).toLocaleString('en-IN');}
function num(n){return Number(n)||0;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function monthName(m){return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m];}

function toast(msg,type){
  const t=document.getElementById('toast');if(!t)return;
  t.textContent=msg;t.style.background=type==='err'?'#991b1b':type==='info'?'#1e40af':'#166534';
  t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>{t.style.display='none';},2800);
}

function loading(show){
  document.getElementById('loader').style.display=show?'flex':'none';
  document.getElementById('app').style.display=show?'none':'block';
  document.getElementById('main-nav').style.display=show?'none':'flex';
}

// ── CURRENT USER DATA ──────────────────────────────────────────────────────
let currentUser = null;
let trips=[], clients=[], vehicles=[], drivers=[], expenses=[], payments=[], company={};

// Firestore helpers
function userRef(col){return collection(db,'users',currentUser.uid,col);}
function userDocRef(col,id){return doc(db,'users',currentUser.uid,col,id);}

async function loadAllData(){
  loading(true);
  const safetyTimer=setTimeout(()=>{loading(false);toast('Connection slow, retry karo','err');render();},12000);
  try{
    const[tSnap,cSnap,vSnap,dSnap,eSnap,pSnap,coSnap]=await Promise.all([
      getDocs(userRef('trips')),
      getDocs(userRef('clients')),
      getDocs(userRef('vehicles')),
      getDocs(userRef('drivers')),
      getDocs(userRef('expenses')),
      getDocs(userRef('payments')),
      getDoc(doc(db,'users',currentUser.uid,'settings','company')),
    ]);
    trips=tSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    clients=cSnap.docs.map(d=>({id:d.id,...d.data()}));
    vehicles=vSnap.docs.map(d=>({id:d.id,number:d.data().number})).map(v=>v.number);
    drivers=dSnap.docs.map(d=>({id:d.id,...d.data()}));
    expenses=eSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    payments=pSnap.docs.map(d=>({id:d.id,...d.data()}));
    company=coSnap.exists()?coSnap.data():{name:'',gst:'',address:'',city:'',phone:'',bankName:'',bankAcc:'',bankIFSC:''};
    if(clients.length===0){
      const defClients=[
        {name:'Milan Bhai',gstNo:'',routes:[{id:'r1',from:'Jaipur',to:'Delhi',rate:4500}]},
        {name:'Tolen',gstNo:'',routes:[{id:'r2',from:'Jaipur',to:'Mumbai',rate:8000}]},
      ];
      for(const c of defClients){const ref=await addDoc(userRef('clients'),c);clients.push({id:ref.id,...c});}
    }
    if(vehicles.length===0){
      await setDoc(userDocRef('vehicles','v1'),{number:'RJ14GB1234'});
      vehicles=['RJ14GB1234'];
    }
  }catch(e){console.error('Load error:',e);toast('Load error: '+e.message,'err');}
  clearTimeout(safetyTimer);
  loading(false);
  S.settForm={...company};
  render();
}

// Save helpers
async function saveTrip(trip){
  try{
    if(trip.id){await setDoc(userDocRef('trips',trip.id),trip);}
    else{const ref=await addDoc(userRef('trips'),trip);trip.id=ref.id;}
    return true;
  }catch(e){toast('Save error: '+e.message,'err');return false;}
}
async function delTrip(id){
  try{await deleteDoc(userDocRef('trips',id));trips=trips.filter(t=>t.id!==id);render();}
  catch(e){toast('Delete error','err');}
}
async function saveClient(clientData,id){
  try{
    if(id){await setDoc(userDocRef('clients',id),clientData);clients=clients.map(c=>c.id===id?{id,...clientData}:c);}
    else{const ref=await addDoc(userRef('clients'),clientData);clients.push({id:ref.id,...clientData});}
    return true;
  }catch(e){toast('Save error: '+e.message,'err');return false;}
}
async function delClient(id){
  try{await deleteDoc(userDocRef('clients',id));clients=clients.filter(c=>c.id!==id);render();}
  catch(e){toast('Delete error','err');}
}
async function saveVehicle(number){
  try{const id=uid();await setDoc(userDocRef('vehicles',id),{number});vehicles.push(number);render();}
  catch(e){toast('Save error','err');}
}
async function delVehicle(number){
  try{
    const snap=await getDocs(userRef('vehicles'));
    for(const d of snap.docs){if(d.data().number===number){await deleteDoc(userDocRef('vehicles',d.id));break;}}
    vehicles=vehicles.filter(v=>v!==number);render();
  }catch(e){toast('Delete error','err');}
}
async function saveDriver(driverData,id){
  try{
    if(id){await setDoc(userDocRef('drivers',id),driverData);drivers=drivers.map(d=>d.id===id?{id,...driverData}:d);}
    else{const ref=await addDoc(userRef('drivers'),driverData);drivers.push({id:ref.id,...driverData});}
    return true;
  }catch(e){toast('Save error','err');return false;}
}
async function delDriver(id){
  try{await deleteDoc(userDocRef('drivers',id));drivers=drivers.filter(d=>d.id!==id);render();}
  catch(e){toast('Delete error','err');}
}
async function saveExpense(exp){
  try{const ref=await addDoc(userRef('expenses'),exp);expenses.unshift({id:ref.id,...exp});render();}
  catch(e){toast('Save error','err');}
}
async function delExpense(id){
  try{await deleteDoc(userDocRef('expenses',id));expenses=expenses.filter(e=>e.id!==id);render();}
  catch(e){toast('Delete error','err');}
}
async function savePayment(pay){
  try{const ref=await addDoc(userRef('payments'),pay);payments.push({id:ref.id,...pay});render();}
  catch(e){toast('Save error','err');}
}
async function delPayment(id){
  try{await deleteDoc(userDocRef('payments',id));payments=payments.filter(p=>p.id!==id);render();}
  catch(e){toast('Delete error','err');}
}
async function saveCompany(data){
  try{await setDoc(doc(db,'users',currentUser.uid,'settings','company'),data);company=data;toast('✓ Settings save!');}
  catch(e){toast('Save error','err');}
}

// ── STATE ──────────────────────────────────────────────────────────────────
let S={
  page:'home', authMode:'login',
  entryDate:today(), pending:[],
  billClient:'all',billPeriod:'month',billFrom:'',billTo:'',billNo:'001',billGst:false,
  billPrintData:null,showBillPrint:false,
  cashMonth:today().slice(0,7),cashDate:today(),cashCat:'driver_cash',cashSelV:[],cashAmt:'',cashDesc:'',showCashForm:false,
  clientForm:null,editingClient:null,
  driverForm:null,editingDriver:null,
  settForm:{...company},
  histFilter:{period:'month',client:'all',vehicle:'all',from:'',to:''},
  plMonth:today().slice(0,7),
  payModal:null,
  driverSalaryPage:null,
  driverSalaryMonth:today().slice(0,7),
};

// ── ROUTER ──────────────────────────────────────────────────────────────────
function go(page){

// ── BUILD PAGE ──────────────────────────────────────────────────────────────
function buildPage(){
  if(S.showBillPrint)return pageBillPrint();
  if(S.clientForm)return pageClientForm();
  if(S.driverForm)return pageDriverForm();
  if(S.payModal)return pagePayModal();
  if(S.driverSalaryPage)return pageDriverSalary();
  switch(S.page){
    case 'home':    return pageHome();
    case 'entry':   return pageEntry();
    case 'bills':   return pageBills();
    case 'cash':    return pageCash();
    case 'more':    return pageMore();
    case 'clients': return pageClients();
    case 'fleet':   return pageFleet();
    case 'drivers': return pageDrivers();
    case 'history': return pageHistory();
    case 'pl':      return pagePL();
    case 'payments':return pagePayments();
    case 'settings':return pageSettings();
    default:        return pageHome();
  }
}

function pageAuth(){
  const isLogin=S.authMode==='login';
  return `
  <div class="auth-screen">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:52px;margin-bottom:8px">🚛</div>
      <div style="font-size:24px;font-weight:900;color:#fff">Trip Ledger Pro</div>

    </div>
    <div class="auth-card">
      <div class="auth-title">${isLogin?'Login Karein':'Account Banayein'}</div>
      <div class="auth-sub">${isLogin?'Apne account mein login karein':'Naya free account banayein'}</div>
      <div class="auth-err" id="auth-err"></div>
      ${!isLogin?`<input class="auth-inp" id="auth-name" type="text" placeholder="Aapka Naam" autocomplete="name">`:''}
      <input class="auth-inp" id="auth-email" type="email" placeholder="Email Address" autocomplete="email" autocorrect="off" autocapitalize="off">
      <input class="auth-inp" id="auth-pass" type="password" placeholder="Password (min 6 characters)" autocomplete="${isLogin?'current-password':'new-password'}">
      <button class="auth-btn" onclick="doAuth()">${isLogin?'🔐 Login':'🚀 Account Banao'}</button>
      <button class="auth-link" onclick="S.authMode='${isLogin?'register':'login'}';document.getElementById('app').innerHTML=pageAuth()">

      </button>
      ${isLogin?`<button class="auth-link" style="color:#94a3b8;font-size:12px" onclick="forgotPass()">Password bhool gaye?</button>`:''}
    </div>
  </div>`;
}

async function doAuth(){
  const email=(document.getElementById('auth-email')?.value||'').trim();
  const pass=document.getElementById('auth-pass')?.value||'';
  const name=document.getElementById('auth-name')?.value||'';
  const errEl=document.getElementById('auth-err');

  if(!email||!pass){showErr('Email aur password daalein');return;}
  if(S.authMode==='register'&&pass.length<6){showErr('Password kam se kam 6 characters ka ho');return;}

  const btn=document.querySelector('.auth-btn');
  btn.textContent='Loading...';btn.disabled=true;

  try{
    if(S.authMode==='register'){
      const cred=await createUserWithEmailAndPassword(auth,email,pass);
      if(name) await updateProfile(cred.user,{displayName:name});
    } else {
      await signInWithEmailAndPassword(auth,email,pass);
    }
  }catch(e){
    btn.textContent=S.authMode==='login'?'🔐 Login':'🚀 Account Banao';
    btn.disabled=false;
    const msgs={'auth/user-not-found':'Email nahi mila','auth/wrong-password':'Galat password','auth/email-already-in-use':'Email pehle se registered hai','auth/invalid-email':'Invalid email','auth/weak-password':'Password weak hai','auth/invalid-credential':'Email ya password galat hai'};
    showErr(msgs[e.code]||e.message);
  }
}

function showErr(msg){
  const el=document.getElementById('auth-err');
  if(el){el.textContent=msg;el.style.display='block';}
}

async function forgotPass(){
  const email=prompt('Email address daalo:');
  if(!email)return;
  try{
    const{sendPasswordResetEmail}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
    await sendPasswordResetEmail(auth,email);
    toast('✓ Reset email bheja gaya!');
  }catch(e){toast('Error: '+e.message,'err');}
}

async function doLogout(){
  if(!confirm('Logout karna chahte ho?'))return;
  try{await signOut(auth);}catch(e){toast('Logout error','err');}
}

        <select class="fsel" onchange="updCl('${vno}','${r.id}',this.value)">

          ${clients.map(c=>`<option value="${c.id}" ${r.clientId===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}

      <div style="flex:1"><div class="flbl">To</div><input class="finp" value="${esc(r.to)}" oninput="updF('${vno}','${r.id}','to',this.value)" placeholder="Kahan tak"></div>
      <div style="width:78px"><div class="flbl">₹</div><input class="finp" type="number" value="${r.amount}" oninput="updF('${vno}','${r.id}','amount',this.value)" placeholder="0"></div>

function getPV(v){return S.pending.find(p=>p.vehicleNo===v);}
function getR(v,rid){return getPV(v)?.rows.find(r=>r.id===rid);}
function togV(v){const i=S.pending.findIndex(p=>p.vehicleNo===v);if(i>=0)S.pending.splice(i,1);else S.pending.push({vehicleNo:v,rows:[{id:uid(),clientId:'',routeId:'',driverId:'',from:'',to:'',amount:''}]});render();}
function updCl(v,rid,val){const r=getR(v,rid);if(!r)return;r.clientId=val;r.routeId='';r.from='';r.to='';r.amount='';render();}
function updRt(v,rid,val){const r=getR(v,rid);if(!r)return;r.routeId=val;const cl=clients.find(c=>c.id===r.clientId);const rt=cl?.routes.find(x=>x.id===val);if(rt){r.from=rt.from;r.to=rt.to;r.amount=rt.rate;}render();}
function updF(v,rid,f,val){const r=getR(v,rid);if(r)r[f]=val;}
function addRow(v){const p=getPV(v);if(p)p.rows.push({id:uid(),clientId:'',routeId:'',driverId:'',from:'',to:'',amount:''});render();}
function delRow(v,rid){const p=getPV(v);if(!p)return;p.rows=p.rows.filter(r=>r.id!==rid);if(!p.rows.length)p.rows=[{id:uid(),clientId:'',routeId:'',driverId:'',from:'',to:'',amount:''}];render();}

async function saveTrips(){
  const newT=[];let skip=0;
  S.pending.forEach(p=>p.rows.forEach(r=>{
    if(!r.clientId||!String(r.from).trim()||!String(r.to).trim()||!r.amount){skip++;return;}
    const cl=clients.find(c=>c.id===r.clientId);
    const drv=drivers.find(d=>d.id===r.driverId);
    newT.push({date:S.entryDate,vehicleNo:p.vehicleNo,clientId:r.clientId,client:cl?.name||'',routeId:r.routeId||'',driverId:r.driverId||'',driver:drv?.name||'',from:r.from,to:r.to,amount:num(r.amount),payStatus:'unpaid'});
  }));
  if(!newT.length){toast('Valid trip bharo!','err');return;}
  const btn=document.querySelector('.btn.primary.full');if(btn){btn.textContent='Saving...';btn.disabled=true;}
  for(const t of newT){
    const ref=await addDoc(userRef('trips'),t);
    trips.unshift({id:ref.id,...t});
  }
  toast('✓ '+newT.length+' trips save!'+(skip?' ('+skip+' skip)':''));
  S.pending=[];render();
}

// ── BILLS ──────────────────────────────────────────────────────────────────
function bRange(){
  const d=new Date(),{billPeriod:p,billFrom:bf,billTo:bt}=S;
  if(p==='today')return[today(),today()];
  if(p==='week'){const s=new Date(d);s.setDate(d.getDate()-6);return[s.toISOString().split('T')[0],today()];}
  if(p==='month')return[new Date(d.getFullYear(),d.getMonth(),1).toISOString().split('T')[0],today()];
  return[bf||today(),bt||today()];
}
function fTrips(sc,rf,rt){return trips.filter(t=>t.date>=rf&&t.date<=rt&&(sc==='all'||t.clientId===sc)).sort((a,b)=>a.date.localeCompare(b.date));}

function pageBills(){
  const{billClient:sc,billPeriod:per,billFrom:bf,billTo:bt,billNo,billGst:gst}=S;
  const[rf,rt]=bRange();const filtered=fTrips(sc,rf,rt);
  const base=filtered.reduce((s,t)=>s+t.amount,0);
  const gstAmt=gst?Math.round(base*0.05):0;const grand=base+gstAmt;

  const maxV=Math.max(...mData.map(m=>Math.max(m.rev,m.exp)),1);

    <div class="sc"><div class="sc-v" style="color:#dc2626">${inr(dayExp)}</div><div class="sc-l">Kharcha</div></div>
    <div class="sc"><div class="sc-v" style="color:${dayRev-dayExp>=0?'#15803d':'#dc2626'}">${inr(dayRev-dayExp)}</div><div class="sc-l">Net</div></div>

  ${dayTrips.map(t=>`<div class="trip-row">
    <div class="vpill">${esc(t.vehicleNo)}</div>
    <div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px">${esc(t.client)}</div><div style="font-size:11px;color:#94a3b8">${esc(t.from)}→${esc(t.to)}</div></div>

  <div style="padding:10px 14px">
    <div class="sec-title">6 Mahine Chart</div>
    <div class="bar-chart">

// ── PAYMENTS ──────────────────────────────────────────────────────────────
function getPayStatus(){
  return clients.map(c=>{
    const cT=trips.filter(t=>t.clientId===c.id);
    const total=cT.reduce((s,t)=>s+t.amount,0);
    const paid=payments.filter(p=>p.clientId===c.id).reduce((s,p)=>s+p.amount,0);
    const pending=Math.max(0,total-paid);
    const status=pending===0?'paid':paid>0?'partial':'unpaid';
    return{clientId:c.id,clientName:c.name,total,paid,pending,status,trips:cT.length};
  }).filter(p=>p.trips>0);
}

async function doSavePay(clientId){
  const date=document.getElementById('pm-date')?.value||today();
  const amt=num(document.getElementById('pm-amt')?.value);
  const note=document.getElementById('pm-note')?.value||'';
  if(!amt){toast('Amount daalein','err');return;}
  await savePayment({clientId,date,amount:amt,note});
  toast('✓ Payment record!');S.payModal=null;render();
}
function payWA(name,pending){const lines=[`Namaste *${name} ji*`,``,`Aapka transport bakaya:`,`*${inr(pending)}*`,``,`Kripya jald payment karein.`,``,company.name||'Transport Company'].filter(Boolean);window.open('https://wa.me/?text='+encodeURIComponent(lines.join('\n')),'_blank');}

function pageHistory(){
  const f=S.histFilter;
  const rf=f.period==='month'?new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().split('T')[0]:f.period==='week'?new Date(Date.now()-6*864e5).toISOString().split('T')[0]:f.from||'2020-01-01';
  const rt=f.period==='custom'?f.to||today():today();
  let filtered=trips.filter(t=>t.date>=rf&&t.date<=rt);
  if(f.client!=='all')filtered=filtered.filter(t=>t.clientId===f.client);
  if(f.vehicle!=='all')filtered=filtered.filter(t=>t.vehicleNo===f.vehicle);
  const totalAmt=filtered.reduce((s,t)=>s+t.amount,0);

  <div class="phdr"><div class="phdr-title">Trip History 📋</div></div>
  <div class="fbox">
    <div class="row" style="margin-bottom:8px">
      <div style="flex:1"><div class="flbl">Period</div>
        <select class="fsel" onchange="S.histFilter.period=this.value;render()">
          ${[['week','Hafte'],['month','Mahine'],['custom','Custom']].map(([v,l])=>`<option value="${v}" ${f.period===v?'selected':''}>${l}</option>`).join('')}
        </select>
      </div>
      <div style="flex:1"><div class="flbl">Client</div>
        <select class="fsel" onchange="S.histFilter.client=this.value;render()">
          <option value="all">Sabhi</option>${clients.map(c=>`<option value="${c.id}" ${f.client===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}

      <div style="flex:1"><div class="flbl">Vehicle</div>
        <select class="fsel" onchange="S.histFilter.vehicle=this.value;render()">
          <option value="all">Sabhi</option>${vehicles.map(v=>`<option value="${v}" ${f.vehicle===v?'selected':''}>${esc(v)}</option>`).join('')}
        </select>
      </div>
    </div>
    ${f.period==='custom'?`<div class="row"><div style="flex:1"><div class="flbl">Se</div><input type="date" class="finp" value="${f.from||''}" onchange="S.histFilter.from=this.value;render()"></div><div style="flex:1"><div class="flbl">Tak</div><input type="date" class="finp" value="${f.to||''}" onchange="S.histFilter.to=this.value;render()"></div></div>`:''}
  </div>

    <div class="sc"><div class="sc-v">${filtered.length}</div><div class="sc-l">Trips</div></div>
    <div class="sc"><div class="sc-v" style="color:#15803d">${inr(totalAmt)}</div><div class="sc-l">Total</div></div>
    <div class="sc"><div class="sc-v">${filtered.length>0?inr(Math.round(totalAmt/filtered.length)):'—'}</div><div class="sc-l">Avg/Trip</div></div>
  </div>

  <div class="sec">

    ${filtered.map(t=>`<div class="trip-row">
      <div class="vpill">${esc(t.vehicleNo)}</div>
      <div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${esc(t.client)}</div>
      <div style="font-size:11px;color:#94a3b8">${fd(t.date)} · ${esc(t.from)}→${esc(t.to)}${t.driver?' · '+esc(t.driver):''}</div></div>

function histCSV(){const f=S.histFilter;const rf=f.period==='month'?new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().split('T')[0]:f.period==='week'?new Date(Date.now()-6*864e5).toISOString().split('T')[0]:f.from||'2020-01-01';const rt=f.period==='custom'?f.to||today():today();let filtered=trips.filter(t=>t.date>=rf&&t.date<=rt);const csv='#,Tarikh,Vehicle,Driver,Client,From,To,Amount\n'+filtered.map((t,i)=>[i+1,fd(t.date),t.vehicleNo,t.driver||'',t.client,t.from,t.to,t.amount].join(',')).join('\n');dlFile(csv,'history.csv','text/csv');toast('✓ CSV!');}
function histWA(){const total=trips.slice(0,10).reduce((s,t)=>s+t.amount,0);const lines=[`*Trip History*`,`Total: ${inr(total)}`,'─────────────',...trips.slice(0,8).map(t=>`${fd(t.date)} | ${t.vehicleNo} | ${t.client} | ${inr(t.amount)}`)];window.open('https://wa.me/?text='+encodeURIComponent(lines.join('\n')),'_blank');}

function openCF(id){
  if(id){const c=clients.find(x=>x.id===id);S.clientForm={name:c.name,gstNo:c.gstNo||'',routes:(c.routes||[]).map(r=>({...r}))};S.editingClient=id;}
  else{S.clientForm={name:'',gstNo:'',routes:[{id:uid(),from:'',to:'',rate:''}]};S.editingClient=null;}render();
}
function closeCF(){S.clientForm=null;S.editingClient=null;render();}
function addRt(){S.clientForm.routes.push({id:uid(),from:'',to:'',rate:''});render();}
function delRt(id){S.clientForm.routes=S.clientForm.routes.filter(r=>r.id!==id);render();}
async function doSaveCl(){
  const name=(document.getElementById('cf-name')?.value||'').trim();
  const gstNo=(document.getElementById('cf-gst')?.value||'').trim();
  if(!name){toast('Client naam daalein','err');return;}
  const routes=S.clientForm.routes.map(r=>({...r,from:(document.getElementById('cf-from-'+r.id)?.value||r.from).trim(),to:(document.getElementById('cf-to-'+r.id)?.value||r.to).trim(),rate:num(document.getElementById('cf-rate-'+r.id)?.value||r.rate)})).filter(r=>r.from&&r.to&&r.rate);
  if(!routes.length){toast('Ek route chahiye','err');return;}
  const ok=await saveClient({name,gstNo,routes},S.editingClient);
  if(ok){toast(S.editingClient?'Update ✓':'Client add ✓');closeCF();}
}

      const totalSalary=baseSalary+extraTotal;
      return`<div class="card" style="border-left:4px solid #f97316">
        <div style=
